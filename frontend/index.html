<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- API base URL. Override per-deploy by editing the `content` attribute.
       Default = the production Render backend; the script below also auto-
       detects same-origin deploys (the existing /app mount on Render). -->
  <meta name="api-base" content="https://internal-crm-bitespeed.onrender.com">
  <title>CS-CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .scroll-y { overflow-y: auto; }
    .tab-active { color: #1f2937; border-bottom: 2px solid #1f2937; font-weight: 600; }
    .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
    .skel { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .modal-bg { background: rgba(15, 23, 42, 0.5); }
    /* Speaker bubbles */
    .speakerA { background: #eef2ff; border-left: 3px solid #6366f1; }
    .speakerB { background: #f0fdf4; border-left: 3px solid #22c55e; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex flex-col">

<!-- Top bar -->
<header class="border-b border-gray-200 bg-white px-5 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-7 h-7 rounded bg-gray-900 text-white grid place-items-center text-xs font-bold">CS</div>
    <h1 class="text-base font-semibold">CS-CRM</h1>
    <span class="text-xs text-gray-400">internal</span>
  </div>
  <div id="health-badge" class="text-xs text-gray-500"></div>
</header>

<!-- Main -->
<main class="flex-1 grid grid-cols-[340px_1fr] overflow-hidden">

  <!-- Left: search panel -->
  <aside class="border-r border-gray-200 bg-white flex flex-col">
    <div class="p-3 border-b border-gray-100">
      <input id="search" type="text" placeholder="Search merchants…" autofocus
        class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-400">
      <div id="search-meta" class="text-xs text-gray-400 mt-2">Type to search · 1,683 merchants</div>
    </div>
    <div id="search-results" class="scroll-y flex-1"></div>
  </aside>

  <!-- Right: profile panel -->
  <section id="profile" class="scroll-y">
    <div id="empty-state" class="h-full grid place-items-center text-gray-400 text-sm p-10 text-center">
      Select a merchant on the left, or paste their shopUrl into the search box.
    </div>
    <div id="merchant" class="hidden">
      <!-- header -->
      <div class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="flex items-start justify-between gap-4">
          <div class="min-w-0">
            <h2 id="m-brand" class="text-xl font-semibold truncate"></h2>
            <a id="m-url" class="text-sm text-gray-500 hover:underline" target="_blank"></a>
            <div id="m-meta" class="mt-2 flex items-center gap-2 flex-wrap"></div>
          </div>
          <div class="flex gap-2">
            <button id="btn-dnc" class="text-xs px-3 py-1.5 border border-gray-200 rounded hover:bg-gray-50">Mark DNC</button>
          </div>
        </div>

        <!-- KPI strip -->
        <div id="kpi" class="mt-4 grid grid-cols-2 md:grid-cols-6 gap-3"></div>
      </div>

      <!-- Tabs -->
      <nav class="bg-white border-b border-gray-200 px-6 flex gap-6 text-sm" id="tabs">
        <button data-tab="timeline" class="py-3 tab-active">Timeline</button>
        <button data-tab="calls" class="py-3 text-gray-500 hover:text-gray-900">Calls</button>
        <button data-tab="meetings" class="py-3 text-gray-500 hover:text-gray-900">Meetings</button>
        <button data-tab="contacts" class="py-3 text-gray-500 hover:text-gray-900">Contacts</button>
        <button data-tab="issues" class="py-3 text-gray-500 hover:text-gray-900">Issues</button>
        <button data-tab="notes" class="py-3 text-gray-500 hover:text-gray-900">Notes</button>
        <button data-tab="whatsapp" class="py-3 text-gray-500 hover:text-gray-900">WhatsApp</button>
      </nav>

      <div id="tab-body" class="p-6"></div>
    </div>
  </section>
</main>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 modal-bg z-40 grid place-items-center p-6" onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-[88vh] overflow-y-auto">
    <div class="p-5 border-b border-gray-200 flex items-center justify-between sticky top-0 bg-white">
      <h3 id="modal-title" class="text-base font-semibold"></h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">×</button>
    </div>
    <div id="modal-body" class="p-5"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-5 right-5 bg-gray-900 text-white text-xs px-3 py-2 rounded shadow-lg z-50"></div>

<script>
// API base resolution, in priority order:
//   1. ?api=<url> in the page query string  — handy for ad-hoc testing
//   2. <meta name="api-base"> in <head>      — set per-deploy (Vercel etc.)
//   3. window.location.origin                — same-origin (Render /app mount)
//      — only used when the page is served over http(s); falls through on file://
const API = (() => {
  const qs = new URLSearchParams(location.search).get('api');
  if (qs) return qs.replace(/\/$/, '');
  const meta = document.querySelector('meta[name="api-base"]');
  if (meta && meta.content) return meta.content.replace(/\/$/, '');
  if (location.protocol.startsWith('http')) return location.origin;
  return 'https://internal-crm-bitespeed.onrender.com';
})();

// ── tiny utilities ─────────────────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const el = (tag, cls, text) => { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; };
const esc = (s) => (s == null ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])));
const fmtDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  const now = new Date();
  const diffMs = now - d;
  const diffH = diffMs / 3600000;
  if (diffH < 1) return Math.max(1, Math.round(diffMs/60000)) + 'm ago';
  if (diffH < 24) return Math.round(diffH) + 'h ago';
  const diffD = Math.round(diffH / 24);
  if (diffD < 7) return diffD + 'd ago';
  return d.toLocaleDateString(undefined, {month:'short', day:'numeric', year: d.getFullYear() === now.getFullYear() ? undefined : 'numeric'});
};
const fmtAbsolute = (iso) => { if (!iso) return ''; const d = new Date(iso); return isNaN(d) ? '' : d.toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}); };
const fmtDuration = (sec) => {
  if (sec == null) return '—';
  const s = Math.round(Number(sec));
  if (s < 60) return s + 's';
  return Math.floor(s/60) + 'm ' + (s%60) + 's';
};
const fmtMin = (m) => m == null ? '—' : Math.round(Number(m)) + 'm';
const sentimentPill = (s) => {
  const map = { positive: 'bg-emerald-50 text-emerald-700', negative: 'bg-rose-50 text-rose-700', neutral: 'bg-gray-100 text-gray-600', concerned: 'bg-amber-50 text-amber-700', frustrated: 'bg-rose-100 text-rose-800', happy: 'bg-emerald-50 text-emerald-700' };
  if (!s) return '';
  return `<span class="pill ${map[s.toLowerCase()] || 'bg-gray-100 text-gray-700'}">${esc(s)}</span>`;
};
const directionPill = (d) => {
  if (!d) return '';
  const isOut = d.startsWith('out');
  return `<span class="pill ${isOut ? 'bg-blue-50 text-blue-700' : 'bg-purple-50 text-purple-700'}">${isOut ? '↗ out' : '↙ in'}</span>`;
};
const connectedDot = (c) => `<span class="inline-block w-2 h-2 rounded-full ${c ? 'bg-emerald-500' : 'bg-gray-300'}" title="${c?'connected':'no answer'}"></span>`;

// ── API client (defensive) ─────────────────────────────────────────────────
async function api(path, opts = {}) {
  const url = API + path;
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const r = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
      if (r.status === 404) return { __notfound: true };
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch (e) {
      if (attempt === 0) {
        await new Promise(r => setTimeout(r, 250));
        continue;
      }
      // graceful: return empty shape so UI can render cleanly
      console.warn('api failed', path, e.message);
      return null;
    }
  }
}
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.add('hidden'), 2200);
}

// ── health badge ───────────────────────────────────────────────────────────
async function refreshHealth() {
  const h = await api('/api/health');
  if (!h) { $('#health-badge').textContent = ''; return; }
  const wa = h.whatsapp || {};
  $('#health-badge').innerHTML =
    `<span class="text-gray-500">${h.shops||0} shops · ${h.meetings||0} meetings · ${h.calls||0} calls · ${wa.messages||0} WA msgs</span>`;
}

// ── search ─────────────────────────────────────────────────────────────────
let searchTimer = null;
$('#search').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  searchTimer = setTimeout(() => doSearch(q), 220);
});
async function doSearch(q) {
  const out = $('#search-results');
  out.innerHTML = '';
  // skeleton
  for (let i = 0; i < 4; i++) {
    const r = el('div', 'p-3 border-b border-gray-50');
    r.innerHTML = '<div class="skel h-4 w-3/4 mb-2"></div><div class="skel h-3 w-1/2"></div>';
    out.appendChild(r);
  }
  const params = new URLSearchParams({ limit: '40' });
  if (q) params.set('q', q);
  const rows = (await api('/api/merchants?' + params)) || [];
  out.innerHTML = '';
  if (!rows.length) {
    out.appendChild(el('div', 'p-6 text-center text-sm text-gray-400', 'No matches'));
    return;
  }
  rows.forEach(s => {
    const row = el('button', 'w-full text-left p-3 border-b border-gray-50 hover:bg-gray-50 block');
    row.dataset.url = s.shop_url;
    row.innerHTML = `
      <div class="text-sm font-medium text-gray-900 truncate">${esc(s.brand_name || s.shop_url)}</div>
      <div class="text-xs text-gray-500 truncate">${esc(s.shop_url)}</div>`;
    row.addEventListener('click', () => { location.hash = '#/m/' + encodeURIComponent(s.shop_url); });
    out.appendChild(row);
  });
  $('#search-meta').textContent = `${rows.length} result${rows.length === 1 ? '' : 's'}${q ? ` for "${q}"` : ''}`;
}

// ── merchant load ──────────────────────────────────────────────────────────
let activeMerchant = null;
let activeTab = 'timeline';

async function loadMerchant(shopUrl) {
  $('#empty-state').classList.add('hidden');
  $('#merchant').classList.remove('hidden');
  $('#m-brand').textContent = 'Loading…';
  $('#m-url').textContent = shopUrl;
  $('#m-meta').innerHTML = '';
  $('#kpi').innerHTML = Array.from({length: 6}).map(() =>
    `<div class="bg-gray-50 rounded p-3"><div class="skel h-3 w-16 mb-2"></div><div class="skel h-6 w-12"></div></div>`).join('');
  $('#tab-body').innerHTML = '';

  const profile = await api('/api/merchants/' + encodeURIComponent(shopUrl));
  if (!profile || profile.__notfound) {
    $('#m-brand').textContent = 'Merchant not found';
    $('#m-url').textContent = shopUrl;
    $('#kpi').innerHTML = '';
    $('#tab-body').innerHTML = '<div class="text-sm text-gray-500">No record for this shopUrl in the master CSV.</div>';
    activeMerchant = null;
    return;
  }
  activeMerchant = profile;
  renderHeader(profile);
  renderKpi(profile.kpi || {});
  loadTab(activeTab);
}

function pill(text, cls) {
  return `<span class="pill ${cls}">${esc(text)}</span>`;
}

function renderHeader(p) {
  $('#m-brand').textContent = p.brand_name || p.shop_url;
  const url = $('#m-url');
  url.textContent = p.shop_url;
  url.href = 'https://' + p.shop_url;
  const meta = $('#m-meta');
  meta.innerHTML = '';
  const status = p.health_status || 'unknown';
  const statusCls = { healthy: 'bg-emerald-50 text-emerald-700', at_risk: 'bg-amber-50 text-amber-700', dnc: 'bg-rose-50 text-rose-700', unknown: 'bg-gray-100 text-gray-600' }[status] || 'bg-gray-100 text-gray-600';
  meta.insertAdjacentHTML('beforeend', pill(status.replace('_',' '), statusCls));
  if (p.outreach_status === 'dnc') meta.insertAdjacentHTML('beforeend', pill('DNC', 'bg-rose-50 text-rose-700'));
  if (p.account_manager) meta.insertAdjacentHTML('beforeend', pill('AM: ' + p.account_manager, 'bg-gray-100 text-gray-600'));
  if (p.confidence) meta.insertAdjacentHTML('beforeend', pill('conf: ' + p.confidence, 'bg-gray-100 text-gray-600'));
}

function kpiTile(label, value, sub) {
  return `<div class="bg-gray-50 rounded p-3">
    <div class="text-[10px] uppercase tracking-wide text-gray-500">${esc(label)}</div>
    <div class="text-xl font-semibold mt-1">${value == null || value === '' ? '—' : esc(value)}</div>
    ${sub ? `<div class="text-[11px] text-gray-500 mt-0.5">${esc(sub)}</div>` : ''}
  </div>`;
}
function renderKpi(k) {
  const rate = k.calls_7d_connect_rate_pct == null ? null : k.calls_7d_connect_rate_pct + '%';
  const lc = k.last_contact_at ? `${fmtDate(k.last_contact_at)} (${k.last_contact_kind || ''})` : 'never';
  $('#kpi').innerHTML = [
    kpiTile('Upcoming meetings', k.upcoming_meetings ?? 0),
    kpiTile('Meetings · 7d', k.meetings_7d ?? 0, k.meetings_7d_total_minutes ? Math.round(k.meetings_7d_total_minutes) + 'm total' : ''),
    kpiTile('Calls · 7d', k.calls_7d_attempted ?? 0, (k.calls_7d_connected ?? 0) + ' connected'),
    kpiTile('Connect rate', rate),
    kpiTile('Open issues', k.open_issues ?? 0),
    kpiTile('Last contact', lc),
  ].join('');
}

// ── tabs ───────────────────────────────────────────────────────────────────
$$('#tabs button').forEach(b => b.addEventListener('click', () => {
  $$('#tabs button').forEach(x => x.classList.remove('tab-active'));
  $$('#tabs button').forEach(x => x.classList.add('text-gray-500'));
  b.classList.remove('text-gray-500');
  b.classList.add('tab-active');
  activeTab = b.dataset.tab;
  loadTab(activeTab);
}));

async function loadTab(tab) {
  if (!activeMerchant) return;
  const body = $('#tab-body');
  body.innerHTML = '<div class="text-sm text-gray-400">Loading…</div>';
  const shop = activeMerchant.shop_url;
  if (tab === 'timeline') return renderTimeline(shop);
  if (tab === 'calls') return renderCalls(shop);
  if (tab === 'meetings') return renderMeetings(shop);
  if (tab === 'contacts') return renderContacts(activeMerchant);
  if (tab === 'issues') return renderIssues(shop);
  if (tab === 'notes') return renderNotes(shop);
  if (tab === 'whatsapp') return renderWhatsApp(activeMerchant);
}

function emptyBlock(msg) {
  return `<div class="text-sm text-gray-400 py-10 text-center">${esc(msg)}</div>`;
}

// ── timeline ───────────────────────────────────────────────────────────────
async function renderTimeline(shop) {
  const items = (await api('/api/merchants/' + encodeURIComponent(shop) + '/timeline?limit=200')) || [];
  if (!items.length) return $('#tab-body').innerHTML = emptyBlock('No activity yet for this merchant.');
  const html = items.map(it => {
    const meta = it.metadata || {};
    let badge = { meeting: 'bg-violet-50 text-violet-700', call: 'bg-blue-50 text-blue-700', note: 'bg-gray-100 text-gray-700', issue: 'bg-amber-50 text-amber-700' }[it.type] || 'bg-gray-100';
    let sub = '';
    if (it.type === 'call') sub = `${meta.connected ? 'connected' : 'no answer'} · ${fmtDuration(meta.duration_sec)}${meta.sentiment ? ' · ' + sentimentPill(meta.sentiment).replace(/<[^>]+>/g,'') : ''}`;
    if (it.type === 'meeting') sub = meta.duration_min ? fmtMin(meta.duration_min) : '';
    if (it.type === 'issue') sub = `${meta.priority || ''} · ${meta.status || ''}`;
    const clickHandler =
      it.type === 'call' ? `onclick="openCall('${esc(it.id)}')"` :
      it.type === 'meeting' ? `onclick="openMeeting('${esc(it.id)}')"` : '';
    const cursor = clickHandler ? 'cursor-pointer hover:bg-gray-50' : '';
    return `<div class="border-l-2 border-gray-200 pl-4 pb-4 relative ${cursor}" ${clickHandler}>
      <div class="absolute -left-[5px] top-1.5 w-2 h-2 rounded-full bg-gray-400"></div>
      <div class="flex items-baseline gap-2 flex-wrap">
        <span class="pill ${badge}">${esc(it.type)}</span>
        <span class="text-sm font-medium">${esc(it.title || '')}</span>
        <span class="text-xs text-gray-400">${esc(fmtAbsolute(it.timestamp))} · ${esc(fmtDate(it.timestamp))}</span>
      </div>
      ${sub ? `<div class="text-xs text-gray-500 mt-0.5">${esc(sub)}</div>` : ''}
      ${it.summary ? `<div class="text-sm text-gray-700 mt-1 line-clamp-2">${esc(prettySummary(it.summary, it.type))}</div>` : ''}
    </div>`;
  }).join('');
  $('#tab-body').innerHTML = `<div class="space-y-1">${html}</div>`;
}

// Calls store summary as JSON; if so, pull narrative out
function prettySummary(s, type) {
  if (type !== 'call' || !s) return s || '';
  try {
    const j = JSON.parse(s);
    if (j && j.summary && j.summary.transcript_summary) return j.summary.transcript_summary;
    return '';
  } catch { return s; }
}

// ── calls ──────────────────────────────────────────────────────────────────
async function renderCalls(shop) {
  const calls = (await api('/api/merchants/' + encodeURIComponent(shop) + '/calls?limit=200')) || [];
  if (!calls.length) return $('#tab-body').innerHTML = emptyBlock('No calls logged for this merchant yet.');
  const conn = calls.filter(c => c.connected).length;
  const total = calls.length;
  const head = `<div class="mb-4 text-xs text-gray-500">${total} call${total!==1?'s':''} · ${conn} connected · ${total ? Math.round(100*conn/total) : 0}% rate</div>`;
  const rows = calls.map(c => {
    const who = c.counterparty_name || c.counterparty_phone || '—';
    const role = c.counterparty_role ? ' · ' + c.counterparty_role : '';
    return `<button onclick="openCall('${esc(c.id)}')" class="w-full text-left p-3 hover:bg-gray-50 border-b border-gray-100 grid grid-cols-[100px_1fr_auto] gap-3 items-start">
      <div class="text-xs text-gray-500">${esc(fmtAbsolute(c.started_at))}</div>
      <div class="min-w-0">
        <div class="text-sm font-medium flex items-center gap-2 flex-wrap">
          ${connectedDot(c.connected)} ${esc(who)}<span class="text-gray-400 text-xs">${esc(role)}</span>
          ${directionPill(c.direction)} ${sentimentPill(c.sentiment)}
        </div>
        <div class="text-xs text-gray-600 mt-0.5 line-clamp-2">${esc(c.summary_text || '')}</div>
      </div>
      <div class="text-xs text-gray-500 whitespace-nowrap">${fmtDuration(c.duration_sec)}</div>
    </button>`;
  }).join('');
  $('#tab-body').innerHTML = head + `<div class="bg-white border border-gray-200 rounded">${rows}</div>`;
}

async function openCall(id) {
  showModal('Call detail', '<div class="text-sm text-gray-400">Loading…</div>');
  const c = await api('/api/calls/' + encodeURIComponent(id));
  if (!c || c.__notfound) return showModal('Call not found', '<div class="text-sm text-gray-500">This call no longer exists.</div>');
  const ai = c.ai_insights || null;
  const summaryText = c.summary_text || (ai && ai.summary && ai.summary.transcript_summary) || '';
  const actionItems = ai && ai.summary && ai.summary.action_items;
  const qa = (ai && Array.isArray(ai.qa)) ? ai.qa.filter(x => x && x.question && x.question !== 'None') : [];
  const segments = c.transcript_segments || [];

  const html = `
    <div class="space-y-4">
      <div class="flex items-center gap-2 flex-wrap">
        ${directionPill(c.direction)}
        ${connectedDot(c.connected)} <span class="text-sm">${c.connected ? 'Connected' : 'No answer'}</span>
        <span class="text-sm text-gray-500">· ${fmtDuration(c.duration_sec)}</span>
        ${sentimentPill(c.sentiment)}
        <span class="text-xs text-gray-400 ml-auto">${esc(fmtAbsolute(c.started_at))}</span>
      </div>
      <div class="grid grid-cols-2 gap-4 text-sm bg-gray-50 rounded p-3">
        <div><div class="text-[10px] uppercase text-gray-500">Counterparty</div><div>${esc(c.counterparty_name || '—')} ${c.counterparty_role ? `<span class="text-gray-400">· ${esc(c.counterparty_role)}</span>` : ''}</div><div class="text-xs text-gray-500">${esc(c.counterparty_phone || '')}</div></div>
        <div><div class="text-[10px] uppercase text-gray-500">Bitespeed agent</div><div>${esc(c.agent_name || '—')}</div><div class="text-xs text-gray-500">${esc(c.agent_email || '')}</div></div>
      </div>
      ${summaryText ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Summary</div><p class="text-sm leading-relaxed">${esc(summaryText)}</p></div>` : ''}
      ${actionItems && actionItems !== 'None' ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Action items</div><p class="text-sm">${esc(actionItems)}</p></div>` : ''}
      ${qa.length ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Key Q&A</div><div class="space-y-2">${qa.map(p => `<div class="text-sm bg-gray-50 rounded p-2"><div class="font-medium">${esc(p.question)}</div><div class="text-gray-700 mt-1">${esc(p.answer)}</div></div>`).join('')}</div></div>` : ''}
      ${segments.length ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Transcript</div><div class="space-y-1.5">${segments.map(s => `<div class="text-sm rounded px-2 py-1 ${s.speaker === 'A' ? 'speakerA' : 'speakerB'}"><span class="text-[10px] text-gray-500 mr-2">${esc(s.speaker || '?')}</span>${esc(s.text || '')}</div>`).join('')}</div></div>` : ''}
      ${c.recording_url ? `<div><a href="${esc(c.recording_url)}" target="_blank" class="text-sm text-blue-600 hover:underline">↗ Open recording</a></div>` : ''}
    </div>`;
  showModal((c.counterparty_name || 'Call') + ' · ' + fmtAbsolute(c.started_at), html);
}

// ── meetings ───────────────────────────────────────────────────────────────
async function renderMeetings(shop) {
  const ms = (await api('/api/merchants/' + encodeURIComponent(shop) + '/meetings?limit=200')) || [];
  if (!ms.length) return $('#tab-body').innerHTML = emptyBlock('No meetings recorded for this merchant yet.');
  const totalMin = ms.reduce((acc, m) => acc + (Number(m.duration_min) || 0), 0);
  const head = `<div class="mb-4 text-xs text-gray-500">${ms.length} meeting${ms.length!==1?'s':''} · ${Math.round(totalMin)}m total</div>`;
  const rows = ms.map(m => {
    const initials = (m.attendee_initials || []).map(i => `<span class="w-6 h-6 rounded-full bg-gray-200 text-[10px] grid place-items-center text-gray-700">${esc(i)}</span>`).join('');
    return `<button onclick="openMeeting('${esc(m.id)}')" class="w-full text-left p-3 hover:bg-gray-50 border-b border-gray-100">
      <div class="grid grid-cols-[120px_1fr_auto] gap-3 items-start">
        <div class="text-xs text-gray-500">${esc(fmtAbsolute(m.date))}</div>
        <div class="min-w-0">
          <div class="text-sm font-medium truncate">${esc(m.title || '(meeting)')}</div>
          <div class="text-xs text-gray-600 mt-0.5 line-clamp-2">${esc(m.summary_short || '')}</div>
          <div class="flex items-center gap-1 mt-1.5">${initials}${m.attendee_count > 3 ? `<span class="text-[10px] text-gray-500 ml-1">+${m.attendee_count-3}</span>` : ''}</div>
        </div>
        <div class="text-xs text-gray-500 whitespace-nowrap">${fmtMin(m.duration_min)}</div>
      </div>
    </button>`;
  }).join('');
  $('#tab-body').innerHTML = head + `<div class="bg-white border border-gray-200 rounded">${rows}</div>`;
}

async function openMeeting(id) {
  showModal('Meeting detail', '<div class="text-sm text-gray-400">Loading…</div>');
  const m = await api('/api/meetings/' + encodeURIComponent(id));
  if (!m || m.__notfound) return showModal('Meeting not found', '<div class="text-sm text-gray-500">No record for this meeting.</div>');
  const atts = (m.attendees || []).map(a => `<div class="text-sm py-1 flex justify-between"><span>${esc(a.display_name || a.email || '?')}</span><span class="text-xs ${a.is_internal ? 'text-blue-600' : 'text-gray-500'}">${a.is_internal ? 'internal' : 'external'} ${esc(a.email || '')}</span></div>`).join('');
  const links = [];
  if (m.recording_url || m.video_url) links.push(`<a class="text-sm text-blue-600 hover:underline" target="_blank" href="${esc(m.video_url || m.recording_url)}">↗ Recording</a>`);
  if (m.audio_url) links.push(`<a class="text-sm text-blue-600 hover:underline" target="_blank" href="${esc(m.audio_url)}">↗ Audio</a>`);
  if (m.transcript_url) links.push(`<a class="text-sm text-blue-600 hover:underline" target="_blank" href="${esc(m.transcript_url)}">↗ Transcript</a>`);
  if (m.meeting_link) links.push(`<a class="text-sm text-blue-600 hover:underline" target="_blank" href="${esc(m.meeting_link)}">↗ Meet link</a>`);
  const html = `
    <div class="space-y-4">
      <div class="flex items-center gap-3 text-xs text-gray-500">
        <span>${esc(fmtAbsolute(m.date))}</span><span>·</span>
        <span>${fmtMin(m.duration_min)}</span>
        ${m.mapping_source ? `<span>·</span><span class="pill bg-gray-100 text-gray-600">via ${esc(m.mapping_source)}</span>` : ''}
      </div>
      ${m.summary_overview ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Overview</div><p class="text-sm leading-relaxed whitespace-pre-line">${esc(m.summary_overview)}</p></div>` : ''}
      ${m.summary_short && !m.summary_overview ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Summary</div><p class="text-sm leading-relaxed">${esc(m.summary_short)}</p></div>` : ''}
      ${m.summary_bullet_gist ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Key points</div><p class="text-sm whitespace-pre-line">${esc(m.summary_bullet_gist)}</p></div>` : ''}
      ${m.action_items ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Action items</div><p class="text-sm whitespace-pre-line">${esc(m.action_items)}</p></div>` : ''}
      ${atts ? `<div><div class="text-[10px] uppercase text-gray-500 mb-1">Attendees (${m.attendees.length})</div><div class="divide-y divide-gray-100">${atts}</div></div>` : ''}
      ${links.length ? `<div class="pt-2 border-t border-gray-100 flex gap-4">${links.join('')}</div>` : ''}
    </div>`;
  showModal(m.title || 'Meeting', html);
}

// ── contacts ───────────────────────────────────────────────────────────────
function renderContacts(p) {
  const cs = p.contacts || [];
  if (!cs.length) return $('#tab-body').innerHTML = emptyBlock('No contacts on file.');
  const ext = cs.filter(c => !c.is_internal);
  const intl = cs.filter(c => c.is_internal);
  function block(label, list) {
    if (!list.length) return '';
    return `<div class="mb-6"><div class="text-[10px] uppercase text-gray-500 mb-2">${esc(label)} (${list.length})</div>
      <div class="bg-white border border-gray-200 rounded divide-y divide-gray-100">
        ${list.map(c => `<div class="p-3 grid grid-cols-3 gap-3 text-sm">
          <div class="font-medium truncate">${esc(c.name || '—')}</div>
          <div class="text-gray-700 truncate">${esc(c.phone || '')}</div>
          <div class="text-gray-700 truncate">${esc(c.email || '')}${c.role ? ` <span class="text-gray-400 text-xs">· ${esc(c.role)}</span>` : ''}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }
  $('#tab-body').innerHTML = block('External', ext) + block('Internal (Bitespeed)', intl);
}

// ── issues ─────────────────────────────────────────────────────────────────
async function renderIssues(shop) {
  const issues = (await api('/api/merchants/' + encodeURIComponent(shop) + '/issues')) || [];
  const form = `
    <details class="mb-4 bg-gray-50 rounded p-3">
      <summary class="text-sm font-medium cursor-pointer">+ New issue</summary>
      <form id="issue-form" class="mt-3 space-y-2">
        <input name="title" placeholder="Title" required class="w-full px-3 py-2 border border-gray-200 rounded text-sm">
        <textarea name="description" placeholder="Description (optional)" rows="2" class="w-full px-3 py-2 border border-gray-200 rounded text-sm"></textarea>
        <div class="flex gap-2">
          <select name="priority" class="px-3 py-2 border border-gray-200 rounded text-sm">
            <option value="med">Medium</option><option value="high">High</option><option value="low">Low</option>
          </select>
          <input name="owner" placeholder="Owner" class="flex-1 px-3 py-2 border border-gray-200 rounded text-sm">
          <button class="px-4 py-2 bg-gray-900 text-white text-sm rounded">Create</button>
        </div>
      </form>
    </details>`;
  let body = form;
  if (!issues.length) body += emptyBlock('No issues filed yet.');
  else {
    body += `<div class="bg-white border border-gray-200 rounded divide-y divide-gray-100">${
      issues.map(i => `<div class="p-3 text-sm">
        <div class="flex items-center gap-2"><span class="font-medium">${esc(i.title)}</span>
          ${pill(i.priority, i.priority === 'high' ? 'bg-rose-50 text-rose-700' : i.priority === 'low' ? 'bg-gray-100 text-gray-500' : 'bg-amber-50 text-amber-700')}
          ${pill(i.status, i.status === 'resolved' ? 'bg-emerald-50 text-emerald-700' : 'bg-gray-100 text-gray-700')}
          <span class="text-xs text-gray-400 ml-auto">${esc(fmtAbsolute(i.opened_at))}</span></div>
        ${i.description ? `<div class="text-gray-700 mt-1">${esc(i.description)}</div>` : ''}
        <div class="text-xs text-gray-500 mt-1">${esc(i.owner || '—')}${i.source ? ` · from ${esc(i.source)}` : ''}</div>
      </div>`).join('')
    }</div>`;
  }
  $('#tab-body').innerHTML = body;
  const f = document.getElementById('issue-form');
  if (f) f.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(f);
    const body = { title: fd.get('title'), description: fd.get('description'), priority: fd.get('priority'), owner: fd.get('owner'), source: 'manual' };
    const r = await api('/api/merchants/' + encodeURIComponent(shop) + '/issues', { method: 'POST', body: JSON.stringify(body) });
    if (r) { toast('Issue created'); renderIssues(shop); } else toast('Could not save');
  });
}

// ── notes ──────────────────────────────────────────────────────────────────
async function renderNotes(shop) {
  const notes = (await api('/api/merchants/' + encodeURIComponent(shop) + '/notes')) || [];
  const form = `
    <details class="mb-4 bg-gray-50 rounded p-3">
      <summary class="text-sm font-medium cursor-pointer">+ New note</summary>
      <form id="note-form" class="mt-3 space-y-2">
        <textarea name="body" placeholder="Note…" required rows="3" class="w-full px-3 py-2 border border-gray-200 rounded text-sm"></textarea>
        <div class="flex gap-2">
          <input name="author" placeholder="Your name" class="flex-1 px-3 py-2 border border-gray-200 rounded text-sm">
          <button class="px-4 py-2 bg-gray-900 text-white text-sm rounded">Save</button>
        </div>
      </form>
    </details>`;
  let body = form;
  if (!notes.length) body += emptyBlock('No notes yet.');
  else {
    body += `<div class="space-y-2">${
      notes.map(n => `<div class="bg-white border border-gray-200 rounded p-3 text-sm">
        <div class="text-xs text-gray-500 mb-1">${esc(n.author || 'team')} · ${esc(fmtAbsolute(n.created_at))}</div>
        <div class="whitespace-pre-line">${esc(n.body)}</div>
      </div>`).join('')
    }</div>`;
  }
  $('#tab-body').innerHTML = body;
  const f = document.getElementById('note-form');
  if (f) f.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(f);
    const body = { body: fd.get('body'), author: fd.get('author') };
    const r = await api('/api/merchants/' + encodeURIComponent(shop) + '/notes', { method: 'POST', body: JSON.stringify(body) });
    if (r) { toast('Note saved'); renderNotes(shop); } else toast('Could not save');
  });
}

// ── whatsapp (placeholder until intern data lands) ─────────────────────────
function renderWhatsApp(p) {
  const groups = p.whatsapp_groups || [];
  const head = `<div class="mb-4 text-xs text-gray-500">${groups.length} group${groups.length!==1?'s':''} · message bodies arrive when bridge ingestion goes live</div>`;
  if (!groups.length) return $('#tab-body').innerHTML = emptyBlock('No WhatsApp groups linked.');
  const rows = groups.map(g => `<div class="bg-white border border-gray-200 rounded p-3 text-sm">
    <div class="font-medium">${esc(g.group_name || '(unnamed group)')}</div>
    <div class="text-xs text-gray-500 mt-0.5">last activity: ${esc(fmtAbsolute(g.last_activity_at) || '—')}</div>
  </div>`).join('');
  $('#tab-body').innerHTML = head + `<div class="space-y-2">${rows}</div>`;
}

// ── DNC ────────────────────────────────────────────────────────────────────
$('#btn-dnc').addEventListener('click', async () => {
  if (!activeMerchant) return;
  const reason = prompt('DNC reason — Churned, Acquisition, Legal hold, Customer request, or Other:', 'Customer request');
  if (!reason) return;
  const r = await api('/api/merchants/' + encodeURIComponent(activeMerchant.shop_url) + '/dnc',
    { method: 'POST', body: JSON.stringify({ reason }) });
  if (r) { toast('Marked DNC'); loadMerchant(activeMerchant.shop_url); } else toast('Could not save');
});

// ── modal ──────────────────────────────────────────────────────────────────
function showModal(title, html) {
  $('#modal-title').textContent = title;
  $('#modal-body').innerHTML = html;
  $('#modal').classList.remove('hidden');
}
function closeModal() { $('#modal').classList.add('hidden'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── routing (hash-based, deep-linkable) ────────────────────────────────────
function routeFromHash() {
  const h = location.hash.replace(/^#\/?/, '');
  if (h.startsWith('m/')) {
    const shop = decodeURIComponent(h.slice(2));
    loadMerchant(shop);
  }
}
window.addEventListener('hashchange', routeFromHash);

// ── boot ───────────────────────────────────────────────────────────────────
(async function init() {
  refreshHealth();
  setInterval(refreshHealth, 30000);
  await doSearch('');   // initial list
  routeFromHash();
})();
</script>
</body>
</html>
