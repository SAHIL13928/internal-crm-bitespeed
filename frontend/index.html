<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Customer CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    // Match the mockup's color palette + font.
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: { ink: { 900: '#0B0D12', 700: '#2A2F3A', 500: '#5B6472', 300: '#AEB4BE' } }
        }
      }
    };
  </script>
  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; }
    .tab-btn[data-active="true"] { color: #111827; border-color: #4f46e5; }
    .tab-btn { border-color: transparent; }
    .dot { width: 6px; height: 6px; border-radius: 9999px; display: inline-block; }
    .speakerA { background: #f1f5f9; border-left: 3px solid #6366f1; }
    .speakerB { background: #f0fdf4; border-left: 3px solid #22c55e; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-white text-ink-900 antialiased">

<!-- ========== SEARCH SCREEN ========== -->
<section id="screen-search" class="min-h-screen flex flex-col items-center justify-center px-6">
  <div class="w-full max-w-lg">
    <div class="flex items-center gap-2 mb-10 justify-center">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 text-white grid place-items-center text-sm font-semibold">C</div>
      <span class="text-base font-semibold tracking-tight">Customer CRM</span>
    </div>
    <h1 class="text-2xl font-semibold tracking-tight text-center mb-1">Search a merchant</h1>
    <p class="text-sm text-ink-500 text-center mb-6">Type a shopUrl or brand to open its profile.</p>
    <div class="relative">
      <input id="search-input" type="text" autocomplete="off"
        placeholder="e.g. avishya2021.myshopify.com"
        class="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500" />
      <div id="search-results" class="absolute left-0 right-0 mt-2 bg-white border border-gray-200 rounded-lg overflow-hidden hidden shadow-sm"></div>
    </div>
    <p class="text-xs text-ink-300 mt-6 text-center">Press Enter to open · Esc to clear</p>
    <div id="search-stats" class="text-xs text-ink-300 mt-12 text-center"></div>
    <!-- Calendar status banner — populated by main.ts on load. Hidden by
         default so it only appears once we know the state. -->
    <div id="calendar-banner" class="hidden text-xs mt-4 text-center"></div>
  </div>
</section>

<!-- ========== MERCHANT PROFILE ========== -->
<section id="screen-profile" class="hidden min-h-screen bg-gray-50/30">
  <header class="sticky top-0 z-20 bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-8 py-4 flex items-center justify-between" id="profile-header"></div>
  </header>

  <div class="max-w-6xl mx-auto px-8 pt-6">
    <div id="kpi-strip" class="grid grid-cols-6 gap-3"></div>
  </div>

  <div class="max-w-6xl mx-auto px-8 mt-6 border-b border-gray-200">
    <nav id="tabs" class="flex gap-6 text-sm">
      <button class="tab-btn py-3 border-b-2 text-ink-500 hover:text-ink-900" data-tab="upcoming" data-active="true">Upcoming</button>
      <button class="tab-btn py-3 border-b-2 text-ink-500 hover:text-ink-900" data-tab="calls">Calls &amp; Meetings</button>
      <button class="tab-btn py-3 border-b-2 text-ink-500 hover:text-ink-900 flex items-center gap-2" data-tab="whatsapp">WhatsApp</button>
      <button class="tab-btn py-3 border-b-2 text-ink-500 hover:text-ink-900 flex items-center gap-2" data-tab="issues">Issues</button>
      <button class="tab-btn py-3 border-b-2 text-ink-500 hover:text-ink-900" data-tab="notes">Notes</button>
    </nav>
  </div>

  <main class="max-w-6xl mx-auto px-8 py-8">
    <div id="tab-body"></div>
  </main>
</section>

<div id="toast" class="hidden fixed bottom-5 right-5 bg-ink-900 text-white text-xs px-3 py-2 rounded shadow-lg z-50"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
