<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Override per-deploy if frontend isn't same-origin with the API. -->
  <meta name="api-base" content="">
  <title>CS-CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tab-active { color: #1f2937; border-bottom: 2px solid #1f2937; font-weight: 600; }
    .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
    .speakerA { background: #eef2ff; border-left: 3px solid #6366f1; }
    .speakerB { background: #f0fdf4; border-left: 3px solid #22c55e; }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<header class="border-b border-gray-200 bg-white px-5 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-gray-900 text-white text-sm font-semibold flex items-center justify-center">CS</div>
    <div class="font-medium">CS-CRM</div>
  </div>
</header>

<div class="grid grid-cols-12 gap-0 min-h-[calc(100vh-57px)]">
  <!-- Sidebar: search -->
  <aside class="col-span-3 border-r border-gray-200 bg-white">
    <div class="p-3 border-b border-gray-200">
      <input id="q" type="search" placeholder="Search merchants…"
             class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    </div>
    <div id="results" class="overflow-y-auto" style="max-height: calc(100vh - 130px);"></div>
  </aside>

  <!-- Main panel -->
  <main class="col-span-9 p-5">
    <div id="merchant-header" class="hidden mb-4"></div>
    <nav id="tabs" class="hidden border-b border-gray-200 mb-4 flex gap-5">
      <button data-tab="overview" class="py-3 text-gray-500 hover:text-gray-900 tab-active">Overview</button>
      <button data-tab="meetings" class="py-3 text-gray-500 hover:text-gray-900">Meetings</button>
      <button data-tab="calls"    class="py-3 text-gray-500 hover:text-gray-900">Calls</button>
      <button data-tab="whatsapp" class="py-3 text-gray-500 hover:text-gray-900">WhatsApp</button>
      <button data-tab="timeline" class="py-3 text-gray-500 hover:text-gray-900">Timeline</button>
    </nav>
    <section id="tab-body">
      <div class="text-sm text-gray-500 italic py-12 text-center">
        Search and select a merchant to begin.
      </div>
    </section>
  </main>
</div>

<div id="toast"
     class="hidden fixed bottom-5 right-5 bg-gray-900 text-white text-xs px-3 py-2 rounded shadow-lg z-50"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
