services:
  - type: web
    name: cs-crm-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Bootstrap rebuilds crm.db from committed inputs whenever the
    # ephemeral disk is empty (cold start, redeploy). No-op on warm
    # restarts — exits in <1s if shops are already loaded.
    startCommand: python scripts/bootstrap_render.py && uvicorn crm_app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FREJUN_WEBHOOK_SECRET
        sync: false
      - key: FREJUN_CLIENT_ID
        sync: false
      - key: FREJUN_CLIENT_SECRET
        sync: false
      - key: FREJUN_API_KEY
        sync: false
      - key: WHATSAPP_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
